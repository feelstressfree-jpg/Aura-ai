<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI | Universal Media Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .accent-gradient { background: linear-gradient(135deg, #38bdf8, #818cf8); }
        .btn-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(56, 189, 248, 0.5); }
        #progressBar { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-5 border-b border-white/5 flex justify-between items-center glass sticky top-0 z-50">
        <div class="text-2xl font-black tracking-tighter text-white">AURA<span class="text-sky-400 italic">AI</span></div>
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400">System Online</span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 pt-12">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-extrabold mb-4">Global Creative <span class="text-sky-400">Studio</span></h1>
            <p class="text-gray-400">Generate high-quality images, videos, and voices in any language.</p>
        </div>

        <div class="glass p-8 rounded-[2rem] mb-10 shadow-2xl">
            <textarea id="promptInput" rows="3" class="w-full bg-transparent border-none outline-none text-xl placeholder-gray-600 mb-6 resize-none" placeholder="Enter your prompt or text here..."></textarea>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase text-gray-500 ml-2">Speech Language</label>
                    <select id="langSelect" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none text-sm cursor-pointer focus:border-sky-500">
                        <option value="hi-IN">Hindi (हिन्दी)</option>
                        <option value="en-US" selected>English (US)</option>
                        <option value="es-ES">Spanish (Español)</option>
                        <option value="fr-FR">French (Français)</option>
                        <option value="de-DE">German (Deutsch)</option>
                        <option value="ja-JP">Japanese (日本語)</option>
                    </select>
                </div>

                <button onclick="generateMedia('image')" class="btn-hover accent-gradient text-white font-bold p-3 rounded-xl text-sm h-[48px]">Create Image</button>
                <button onclick="generateMedia('video')" class="btn-hover bg-white/10 border border-white/10 font-bold p-3 rounded-xl text-sm h-[48px]">Create Video</button>
                <button onclick="generateSpeech()" class="btn-hover bg-sky-500/20 text-sky-400 border border-sky-500/30 font-bold p-3 rounded-xl text-sm h-[48px]">Gen & Download Audio</button>
            </div>

            <div id="progressCont" class="hidden mt-8">
                <div class="flex justify-between text-[10px] font-bold mb-2 text-gray-500">
                    <span id="statusLabel">Processing...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full accent-gradient w-0"></div>
                </div>
            </div>
        </div>

        <div id="outputContainer" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass p-4 rounded-3xl overflow-hidden">
                <img id="outputImg" class="w-full h-auto rounded-2xl shadow-xl" src="" alt="Aura AI Result">
            </div>
            <div class="glass p-8 rounded-3xl flex flex-col justify-center">
                <h3 class="text-xl font-bold mb-2">Media Assets</h3>
                <p class="text-sm text-gray-500 mb-6 italic" id="finalPromptText"></p>
                <a id="downloadBtn" href="#" download="aura-ai-asset" class="block text-center bg-white text-black font-bold py-4 rounded-2xl btn-hover">Download High-Res Asset</a>
            </div>
        </div>
    </main>

    <footer class="p-10 text-center border-t border-white/5 mt-20">
        <p class="text-[10px] font-bold tracking-[0.6em] text-gray-600 uppercase">Aura AI Universal &copy; 2026</p>
    </footer>

    <script>
        // --- 1. Text to Speech with Download ---
        async function generateSpeech() {
            const text = document.getElementById('promptInput').value;
            const lang = document.getElementById('langSelect').value;
            if (!text) return alert("Please enter text first!");

            // Using Google Translate TTS Engine (Free & Reliable for Download)
            const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${lang.split('-')[0]}&client=tw-ob`;
            
            // Audio Playback
            const audio = new Audio(ttsUrl);
            audio.play();

            // Setup Download Link
            const downloadBtn = document.getElementById('downloadBtn');
            const outputContainer = document.getElementById('outputContainer');
            const outputImg = document.getElementById('outputImg');

            outputImg.src = "https://cdn-icons-png.flaticon.com/512/727/727245.png"; // Audio Icon placeholder
            outputContainer.classList.remove('hidden');
            downloadBtn.href = ttsUrl;
            downloadBtn.innerText = "Download Audio File";
            
            alert("Playing Audio... You can now download it using the button below.");
        }

        // --- 2. Robust Image/Video Generation ---
        async function generateMedia(type) {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return alert("Please enter a prompt!");

            const progressCont = document.getElementById('progressCont');
            const progressBar = document.getElementById('progressBar');
            const statusLabel = document.getElementById('statusLabel');
            const progressPercent = document.getElementById('progressPercent');
            const outputContainer = document.getElementById('outputContainer');
            const outputImg = document.getElementById('outputImg');
            const downloadBtn = document.getElementById('downloadBtn');

            // Reset UI
            progressCont.classList.remove('hidden');
            outputContainer.classList.add('hidden');
            let progress = 0;

            const updateProgress = (p, label) => {
                progressBar.style.width = p + "%";
                progressPercent.innerText = p + "%";
                statusLabel.innerText = label;
            };

            updateProgress(20, "Analyzing Language...");
            
            const seed = Math.floor(Math.random() * 9999999);
            // Pollinations with FLUX model (Best for Hindi/Global prompts)
            const apiUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1080&height=1080&seed=${seed}&model=flux&enhance=${type === 'video'}`;

            try {
                updateProgress(50, `Generating ${type.toUpperCase()}...`);
                
                // Fetch image to ensure it's ready
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error();

                const blob = await response.blob();
                const objectURL = URL.createObjectURL(blob);

                updateProgress(100, "Finalizing Asset...");

                setTimeout(() => {
                    outputImg.src = objectURL;
                    downloadBtn.href = objectURL;
                    downloadBtn.innerText = `Download ${type.charAt(0).toUpperCase() + type.slice(1)}`;
                    document.getElementById('finalPromptText').innerText = `Prompt: ${prompt}`;
                    
                    progressCont.classList.add('hidden');
                    outputContainer.classList.remove('hidden');
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }, 800);

            } catch (error) {
                alert("Server busy. Aura Engine is retrying automatically...");
                setTimeout(() => generateMedia(type), 2000);
            }
        }
    </script>
</body>
</html>
