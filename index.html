<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI | Multi-Media Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
        .glass-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; }
        .input-box { background: #111; border: 1px solid #222; border-radius: 16px; color: white; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.1); }
        select option { background: #111; color: white; padding: 10px; } /* Fixed visibility */
        .loader-line { height: 3px; width: 0%; background: #38bdf8; transition: width 0.4s ease; border-radius: 10px; }
        .btn-primary { background: #fff; color: #000; font-weight: 700; transition: 0.3s; }
        .btn-primary:hover { background: #e2e2e2; transform: scale(1.02); }
        .btn-secondary { background: #111; border: 1px solid #222; transition: 0.3s; }
        .btn-secondary:hover { background: #1a1a1a; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="max-w-5xl mx-auto flex justify-between items-center mb-12">
        <div class="text-2xl font-black tracking-tighter">AURA<span class="text-sky-500 italic">AI</span></div>
        <div class="text-[10px] border border-white/20 px-3 py-1 rounded-full text-gray-400 font-bold uppercase tracking-widest">v3.5 Stable</div>
    </nav>

    <main class="max-w-4xl mx-auto">
        <div class="glass-card p-6 md:p-10">
            <h2 class="text-xl font-semibold mb-6 text-gray-400">What are we creating today?</h2>
            
            <textarea id="promptInput" class="input-box w-full p-4 text-lg min-h-[120px] mb-6" placeholder="Describe your image or type text to convert into speech..."></textarea>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Output Language</label>
                    <select id="langSelect" class="input-box p-3 text-sm cursor-pointer">
                        <option value="en">English (Global)</option>
                        <option value="hi">Hindi (हिन्दी)</option>
                        <option value="es">Spanish (Español)</option>
                        <option value="fr">French (Français)</option>
                        <option value="ja">Japanese (日本語)</option>
                    </select>
                </div>

                <div class="md:col-span-2 grid grid-cols-2 gap-3">
                    <button onclick="generateMedia('image')" id="imgBtn" class="btn-primary p-3 rounded-xl text-sm">Create Image</button>
                    <button onclick="generateMedia('video')" id="vidBtn" class="btn-secondary p-3 rounded-xl text-sm">Create Video</button>
                </div>
            </div>

            <button onclick="generateSpeech()" id="ttsBtn" class="w-full mt-4 bg-sky-500/10 text-sky-400 border border-sky-500/20 p-4 rounded-xl font-bold hover:bg-sky-500/20 transition">
                Generate & Download Voice (TTS)
            </button>

            <div id="loaderArea" class="hidden mt-8">
                <div class="flex justify-between text-[10px] font-bold text-gray-500 mb-2 uppercase">
                    <span id="loadText">Processing...</span>
                    <span id="loadPercent">0%</span>
                </div>
                <div class="w-full bg-white/5 rounded-full overflow-hidden">
                    <div id="loaderBar" class="loader-line"></div>
                </div>
            </div>
        </div>

        <div id="resultArea" class="hidden mt-10">
            <div class="glass-card overflow-hidden">
                <div class="p-4 border-b border-white/5 flex justify-between items-center bg-white/5">
                    <span class="text-[10px] font-black uppercase tracking-widest text-sky-500">Aura AI Generated Content</span>
                    <button onclick="location.reload()" class="text-[10px] text-gray-500 hover:text-white uppercase font-bold">Clear All</button>
                </div>
                
                <div class="p-2">
                    <img id="outputMedia" class="w-full rounded-2xl shadow-2xl h-auto min-h-[200px] bg-[#050505]" src="" alt="Output">
                </div>

                <div class="p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                    <p id="promptDisplay" class="text-sm text-gray-500 italic max-w-md"></p>
                    <a id="downLink" href="#" download="AuraAI_Asset" class="bg-white text-black px-8 py-3 rounded-xl font-bold text-sm btn-primary">Download Asset</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-20 text-center pb-10">
        <p class="text-[10px] tracking-[0.5em] text-gray-700 font-bold uppercase italic">Aura AI Research Studio &copy; 2026</p>
    </footer>

    <script>
        // --- TEXT TO SPEECH (FIXED DOWNLOAD & LANGUAGE) ---
        function generateSpeech() {
            const text = document.getElementById('promptInput').value;
            const lang = document.getElementById('langSelect').value;
            if(!text) return alert("Write something first!");

            // Using a more reliable TTS endpoint for direct download
            const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${lang}&client=tw-ob`;
            
            // UI Update
            const resArea = document.getElementById('resultArea');
            const outMed = document.getElementById('outputMedia');
            const dLink = document.getElementById('downLink');

            outMed.src = "https://img.freepik.com/premium-vector/equalizer-wave-background_23-2148117768.jpg"; // Audio Visualizer static
            dLink.href = ttsUrl;
            dLink.innerText = "Download MP3 Audio";
            document.getElementById('promptDisplay').innerText = "Audio ready for download.";
            
            resArea.classList.remove('hidden');
            const audio = new Audio(ttsUrl);
            audio.play();
            
            alert("Playing preview... Click 'Download MP3' to save it.");
        }

        // --- IMAGE & VIDEO GENERATION (ROBUST) ---
        async function generateMedia(type) {
            const prompt = document.getElementById('promptInput').value;
            if(!prompt) return alert("Prompt empty!");

            const lBar = document.getElementById('loaderBar');
            const lArea = document.getElementById('loaderArea');
            const lText = document.getElementById('loadText');
            const lPer = document.getElementById('loadPercent');
            const resArea = document.getElementById('resultArea');

            // Reset UI
            lArea.classList.remove('hidden');
            resArea.classList.add('hidden');
            let p = 0;

            const update = (val, txt) => {
                lBar.style.width = val + "%";
                lPer.innerText = val + "%";
                lText.innerText = txt;
            };

            update(15, "Initializing Aura Engine...");

            const seed = Math.floor(Math.random() * 999999);
            // Stable Flux Model
            const apiUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&model=flux&nologo=true`;

            try {
                update(45, type === 'video' ? "Compiling Frames..." : "Painting Pixels...");
                
                // Pre-check image
                const img = new Image();
                img.src = apiUrl;
                
                img.onload = () => {
                    update(100, "Done!");
                    setTimeout(() => {
                        document.getElementById('outputMedia').src = apiUrl;
                        document.getElementById('downLink').href = apiUrl;
                        document.getElementById('downLink').innerText = "Download " + type.toUpperCase();
                        document.getElementById('promptDisplay').innerText = prompt;
                        
                        lArea.classList.add('hidden');
                        resArea.classList.remove('hidden');
                        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
                    }, 500);
                };

                img.onerror = () => {
                    update(0, "API Busy. Retrying in 2 seconds...");
                    setTimeout(() => generateMedia(type), 2000);
                };

            } catch (e) {
                console.error(e);
                alert("Something went wrong. Let's try again.");
            }
        }
    </script>
</body>
</html>
