<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .glass { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; }
        select { background: #111 !important; color: #fff !important; border: 1px solid #333 !important; padding: 10px; border-radius: 8px; appearance: none; }
        option { background: #111 !important; color: #fff !important; }
        .loading-line { height: 4px; background: #0ea5e9; width: 0%; transition: 0.4s; }
        .media-box { background: #050505; min-height: 300px; border-radius: 15px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="mb-10 flex justify-between items-center">
            <h1 class="text-3xl font-black">AURA<span class="text-sky-500">AI</span></h1>
            <div class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest border border-zinc-800 px-3 py-1 rounded-full">Final Stable Build</div>
        </header>

        <div class="glass p-6 md:p-8 mb-8">
            <textarea id="userInput" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-4 text-white mb-6 outline-none focus:border-sky-500 h-32" placeholder="Write your prompt or speech text here..."></textarea>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-zinc-500 uppercase">Voice Language</label>
                    <select id="lang">
                        <option value="hi-IN">Hindi (India)</option>
                        <option value="en-US">English (US)</option>
                        <option value="es-ES">Spanish</option>
                        <option value="fr-FR">French</option>
                    </select>
                </div>
                <button onclick="generate('image')" class="bg-white text-black font-bold rounded-xl h-12 hover:bg-zinc-200 transition">Create Image</button>
                <button onclick="generate('video')" class="bg-zinc-800 text-white font-bold rounded-xl h-12 hover:bg-zinc-700 transition">Create Video</button>
            </div>

            <button onclick="generateSpeech()" class="w-full mt-4 bg-sky-600/10 text-sky-500 border border-sky-500/20 font-bold py-4 rounded-xl hover:bg-sky-500/20 transition">Generate & Download Voice</button>

            <div id="loader" class="hidden mt-8">
                <div class="flex justify-between text-[10px] font-bold text-zinc-500 mb-2">
                    <span id="loadStatus">AURA ENGINE PROCESSING...</span>
                    <span id="percent">0%</span>
                </div>
                <div class="w-full bg-zinc-900 rounded-full overflow-hidden">
                    <div id="bar" class="loading-line"></div>
                </div>
            </div>
        </div>

        <div id="result" class="hidden glass p-4 animate-pulse">
            <div id="display" class="media-box overflow-hidden mb-6"></div>
            <div class="flex flex-col md:flex-row justify-between items-center p-4 gap-4 border-t border-zinc-900">
                <p id="desc" class="text-sm text-zinc-500 italic"></p>
                <a id="downBtn" href="#" download class="bg-sky-500 text-white font-bold px-8 py-3 rounded-xl hover:bg-sky-600 transition w-full md:w-auto text-center">Download File</a>
            </div>
        </div>
    </div>

    <script>
        // --- SPEECH GENERATION (FIXED DOWNLOAD) ---
        async function generateSpeech() {
            const text = document.getElementById('userInput').value;
            const lang = document.getElementById('lang').value.split('-')[0];
            if(!text) return alert("Please enter text!");

            const status = document.getElementById('loadStatus');
            const res = document.getElementById('result');
            const display = document.getElementById('display');
            const downBtn = document.getElementById('downBtn');

            // Using a more stable TTS bridge
            const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${lang}&client=tw-ob`;
            
            display.innerHTML = `
                <div class="text-center">
                    <div class="text-sky-500 text-6xl mb-4">♪</div>
                    <audio id="player" controls src="${ttsUrl}" class="mx-auto"></audio>
                </div>
            `;
            
            downBtn.href = ttsUrl;
            downBtn.innerText = "Download MP3 Audio";
            document.getElementById('desc').innerText = "Voice generated in " + lang.toUpperCase();
            res.classList.remove('hidden');
            res.classList.remove('animate-pulse');
            
            document.getElementById('player').play();
            alert("Audio is ready! You can play it or click download.");
        }

        // --- IMAGE & VIDEO (ROBUST RETRY LOGIC) ---
        async function generate(type) {
            const prompt = document.getElementById('userInput').value;
            if(!prompt) return alert("Prompt is required!");

            const loader = document.getElementById('loader');
            const bar = document.getElementById('bar');
            const percent = document.getElementById('percent');
            const res = document.getElementById('result');
            const display = document.getElementById('display');
            const downBtn = document.getElementById('downBtn');

            loader.classList.remove('hidden');
            res.classList.add('hidden');
            
            let p = 0;
            const timer = setInterval(() => {
                if(p < 95) {
                    p += Math.random() * 5;
                    bar.style.width = p + "%";
                    percent.innerText = Math.floor(p) + "%";
                }
            }, 500);

            const seed = Math.floor(Math.random() * 999999);
            const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&model=flux&nologo=true`;

            const img = new Image();
            img.src = url;

            img.onload = () => {
                clearInterval(timer);
                bar.style.width = "100%";
                percent.innerText = "100%";
                
                setTimeout(() => {
                    display.innerHTML = `<img src="${url}" class="w-full h-auto">`;
                    downBtn.href = url;
                    downBtn.innerText = "Download " + type.toUpperCase();
                    document.getElementById('desc').innerText = prompt;
                    
                    loader.classList.add('hidden');
                    res.classList.remove('hidden');
                    res.classList.remove('animate-pulse');
                }, 500);
            };

            img.onerror = () => {
                clearInterval(timer);
                document.getElementById('loadStatus').innerText = "Engine busy, retrying...";
                setTimeout(() => generate(type), 2000); // Auto-Retry
            };
        }
    </script>
</body>
</html>
