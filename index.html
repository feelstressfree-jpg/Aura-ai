<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI | Pro Multi-Gen Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Outfit', sans-serif; }
        body { background: #050505; color: white; }
        .aura-border { border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .aura-border:focus-within { border-color: #06b6d4; box-shadow: 0 0 20px rgba(6, 182, 212, 0.2); }
        .gradient-text { background: linear-gradient(90deg, #a855f7, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader-bar { height: 4px; width: 0%; background: #06b6d4; transition: width 0.4s ease; shadow: 0 0 10px #06b6d4; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="p-6 border-b border-white/5 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="text-xl font-black tracking-tighter uppercase italic gradient-text">AURA AI PRO</div>
        <div class="text-[10px] bg-white/10 px-3 py-1 rounded-full text-gray-400 font-bold tracking-widest uppercase">Global Engine v3.0</div>
    </nav>

    <main class="flex-grow p-6 max-w-4xl mx-auto w-full">
        <div class="mt-10 mb-12 text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tight">One Prompt. <span class="gradient-text">Infinite Media.</span></h1>
            <p class="text-gray-500 text-sm">Type in Hindi, English, Spanish or any language. Our AI adapts instantly.</p>
        </div>

        <div class="aura-border bg-white/5 p-4 rounded-3xl mb-8">
            <textarea id="mainInput" class="w-full bg-transparent border-none outline-none text-lg p-2 min-h-[100px] placeholder-gray-600" placeholder="Type your vision here... e.g. 'एक उड़ने वाला घोड़ा'"></textarea>
            
            <div id="progressCont" class="hidden mb-4 bg-white/10 rounded-full overflow-hidden">
                <div id="progressBar" class="loader-bar"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mt-4">
                <button onclick="handleGen('image')" id="btn-img" class="bg-white text-black font-bold py-3 rounded-2xl hover:bg-gray-200 transition text-sm">Create Image</button>
                <button onclick="handleGen('video')" id="btn-vid" class="bg-white/10 text-white font-bold py-3 rounded-2xl hover:bg-white/20 transition text-sm border border-white/10">Create Video</button>
                <button onclick="handleTTS()" id="btn-tts" class="bg-cyan-600/20 text-cyan-400 font-bold py-3 rounded-2xl hover:bg-cyan-600/30 transition text-sm border border-cyan-500/30">Speak Text</button>
            </div>
        </div>

        <div id="statusMsg" class="text-center text-xs font-bold uppercase tracking-widest text-gray-500 mb-6 hidden"></div>

        <div id="resultCard" class="hidden space-y-6">
            <div class="aura-border bg-black rounded-3xl overflow-hidden shadow-2xl">
                <div class="p-3 bg-white/5 flex justify-between items-center">
                    <span class="text-[10px] font-bold uppercase text-gray-400 tracking-widest" id="resType">Output</span>
                    <button onclick="window.location.reload()" class="text-[10px] text-cyan-400 uppercase font-bold">Clear</button>
                </div>
                <img id="outMedia" class="w-full h-auto" src="" alt="AI Output">
                <div class="p-6">
                    <p id="resDesc" class="text-sm text-gray-400 italic font-light"></p>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-10 border-t border-white/5 text-center">
        <p class="text-[10px] text-gray-700 font-black tracking-[0.5em] uppercase">Shashi AI Research Labs &copy; 2026</p>
    </footer>

    <script>
        const voices = window.speechSynthesis;

        // --- TEXT TO SPEECH FUNCTION ---
        function handleTTS() {
            const text = document.getElementById('mainInput').value;
            if (!text) return alert("Kuch likho pehle!");

            // Cancel any ongoing speech
            voices.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            
            // Auto-detect setting
            utterance.rate = 0.9; 
            utterance.pitch = 1;

            // Wait for voices to be ready (specifically for Chrome)
            const speak = () => {
                voices.speak(utterance);
                document.getElementById('statusMsg').innerText = "AI is speaking...";
                document.getElementById('statusMsg').classList.remove('hidden');
            };

            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = speak;
            }
            speak();
        }

        // --- IMAGE & VIDEO GENERATION ---
        async function handleGen(type) {
            const prompt = document.getElementById('mainInput').value;
            if (!prompt) return alert("Prompt is empty!");

            const btnImg = document.getElementById('btn-img');
            const btnVid = document.getElementById('btn-vid');
            const progressCont = document.getElementById('progressCont');
            const progressBar = document.getElementById('progressBar');
            const statusMsg = document.getElementById('statusMsg');
            const resultCard = document.getElementById('resultCard');
            const outMedia = document.getElementById('outMedia');

            // UI Reset
            btnImg.disabled = btnVid.disabled = true;
            statusMsg.classList.remove('hidden', 'text-red-500');
            statusMsg.innerText = "Initializing Aura Engine...";
            progressCont.classList.remove('hidden');
            progressBar.style.width = "10%";

            // Simulation of deep processing
            let width = 10;
            const step = setInterval(() => {
                if (width < 90) {
                    width += Math.random() * 5;
                    progressBar.style.width = width + "%";
                    if(width > 40) statusMsg.innerText = "Analyzing Language & Prompt...";
                    if(width > 70) statusMsg.innerText = "Rendering High-Quality Pixels...";
                }
            }, 400);

            const seed = Math.floor(Math.random() * 1000000);
            // Optimization: Flux model is great for multi-language
            const baseUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&model=flux&nologo=true`;
            const finalUrl = type === 'video' ? baseUrl + "&enhance=true" : baseUrl;

            // Pre-loading image to check if it fails or succeeds
            const imgChecker = new Image();
            imgChecker.src = finalUrl;

            imgChecker.onload = () => {
                clearInterval(step);
                progressBar.style.width = "100%";
                statusMsg.innerText = "Generation Successful!";
                
                setTimeout(() => {
                    outMedia.src = finalUrl;
                    document.getElementById('resType').innerText = type === 'video' ? "Video Render" : "Image Render";
                    document.getElementById('resDesc').innerText = `Prompt used: "${prompt}"`;
                    resultCard.classList.remove('hidden');
                    progressCont.classList.add('hidden');
                    btnImg.disabled = btnVid.disabled = false;
                    window.scrollTo({top: resultCard.offsetTop - 100, behavior: 'smooth'});
                }, 500);
            };

            imgChecker.onerror = () => {
                clearInterval(step);
                statusMsg.innerText = "Generation Failed. Retrying...";
                statusMsg.classList.add('text-red-500');
                btnImg.disabled = btnVid.disabled = false;
                // Auto-retry once
                setTimeout(() => handleGen(type), 2000);
            };
        }
    </script>
</body>
</html>
