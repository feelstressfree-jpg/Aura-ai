<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI | Multi-Language Creative Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Outfit', sans-serif; scroll-behavior: smooth; }
        body { background: #020202; color: white; overflow-x: hidden; }
        .aura-gradient { background: linear-gradient(135deg, #a855f7, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .btn-action { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.1); }
        .btn-action:hover:not(:disabled) { transform: translateY(-3px); background: rgba(255,255,255,0.1); border-color: #06b6d4; }
        .progress-bar { height: 6px; width: 0%; background: linear-gradient(90deg, #06b6d4, #a855f7); border-radius: 10px; transition: width 0.3s ease; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full py-5 px-8 flex justify-between items-center z-50 bg-black/80 backdrop-blur-xl border-b border-white/5">
        <div class="text-2xl font-black aura-gradient italic">AURA AI</div>
        <div class="text-[10px] font-bold uppercase tracking-widest text-gray-500">Multi-Language Support Active</div>
    </nav>

    <main class="pt-32 pb-20 px-6 max-w-6xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-5xl md:text-7xl font-black mb-4 tracking-tighter">Global AI <span class="aura-gradient">Studio</span></h1>
            <p class="text-gray-500">Create in any language. Supported: English, Hindi, Spanish, Arabic, & more.</p>
        </div>

        <div class="glass-card p-6 mb-8 shadow-2xl">
            <textarea id="userInput" rows="3" 
                      placeholder="Enter prompt in any language... (e.g., 'एक सुंदर जंगल' or 'A futuristic city')" 
                      class="bg-transparent w-full outline-none text-xl placeholder-gray-700 resize-none mb-6"></textarea>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <button onclick="generateContent('image')" id="btnImg" class="btn-action p-4 rounded-xl font-bold text-sm bg-white/5">
                    🖼️ Text to Image
                </button>
                <button onclick="generateContent('video')" id="btnVid" class="btn-action p-4 rounded-xl font-bold text-sm bg-white/5">
                    🎬 Text to Video
                </button>
                <button onclick="speakText()" id="btnSpeak" class="btn-action p-4 rounded-xl font-bold text-sm bg-white/5">
                    🔊 Text to Speech
                </button>
            </div>

            <div id="statusBox" class="mt-8 hidden">
                <div class="flex justify-between text-[10px] uppercase mb-2 tracking-widest text-gray-400">
                    <span id="statusLabel">Initializing...</span>
                    <span id="statusPercent">0%</span>
                </div>
                <div class="w-full bg-white/5 rounded-full overflow-hidden">
                    <div id="pBar" class="progress-bar"></div>
                </div>
            </div>
        </div>

        <div id="outputArea" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-card p-4">
                <h4 class="text-xs font-bold text-gray-500 mb-4 uppercase">Visual Output</h4>
                <img id="mainResult" class="w-full rounded-xl shadow-lg border border-white/5" src="">
                <a id="downloadLink" href="#" download class="block text-center mt-4 text-[10px] uppercase text-cyan-400 font-bold">Download HD</a>
            </div>
            <div class="glass-card p-4 flex flex-col justify-center items-center text-center space-y-4">
                <div class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center text-2xl">🌍</div>
                <h4 class="font-bold">Intelligence Report</h4>
                <p id="reportText" class="text-sm text-gray-500 leading-relaxed italic">Ready to process global languages...</p>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center border-t border-white/5 text-[10px] text-gray-700 font-bold uppercase tracking-[0.4em]">
        &copy; 2026 Aura AI Studio | Built by Shashi
    </footer>

    <script>
        // 1. Text to Speech (Multi-Language)
        function speakText() {
            const text = document.getElementById('userInput').value;
            if (!text) return alert("Please enter text first!");

            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            // Auto-detects language based on browser/text
            window.speechSynthesis.speak(msg);
            
            document.getElementById('reportText').innerText = "Vocalizing text in detected language...";
        }

        // 2. Generation Engine (Image & Video)
        async function generateContent(type) {
            const prompt = document.getElementById('userInput').value;
            if (!prompt) return alert("Please enter a prompt!");

            const btnImg = document.getElementById('btnImg');
            const btnVid = document.getElementById('btnVid');
            const statusBox = document.getElementById('statusBox');
            const pBar = document.getElementById('pBar');
            const statusLabel = document.getElementById('statusLabel');
            const statusPercent = document.getElementById('statusPercent');
            const outputArea = document.getElementById('outputArea');
            const mainResult = document.getElementById('mainResult');

            // UI Setup
            btnImg.disabled = btnVid.disabled = true;
            statusBox.classList.remove('hidden');
            outputArea.classList.add('hidden');
            statusLabel.innerText = type === 'video' ? "Rendering Motion..." : "Illuminating Image...";
            
            // Progress Animation
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 90) progress = 92;
                pBar.style.width = progress + "%";
                statusPercent.innerText = Math.floor(progress) + "%";
            }, 300);

            const seed = Math.floor(Math.random() * 999999);
            // Pollinations handles Multi-language prompts automatically
            const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&model=flux&enhance=${type === 'video'}`;

            mainResult.src = url;

            mainResult.onload = () => {
                clearInterval(interval);
                pBar.style.width = "100%";
                statusPercent.innerText = "100%";
                
                setTimeout(() => {
                    statusBox.classList.add('hidden');
                    outputArea.classList.remove('hidden');
                    btnImg.disabled = btnVid.disabled = false;
                    document.getElementById('downloadLink').href = url;
                    document.getElementById('reportText').innerText = `Successfully generated ${type} from multi-language input.`;
                }, 500);
            };

            mainResult.onerror = () => {
                clearInterval(interval);
                alert("Generation failed. Please try again.");
                btnImg.disabled = btnVid.disabled = false;
                statusBox.classList.add('hidden');
            };
        }
    </script>
</body>
</html>
